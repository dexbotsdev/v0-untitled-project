version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-secret-encryption-key-change-me-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-true}
      - PERSIST_PATH=/app/data/storage.json
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
